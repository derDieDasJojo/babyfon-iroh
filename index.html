<!DOCTYPE html>
<html lang="de" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Felsenfestes P2P Babyfon</title>
    <link rel="stylesheet" href="https://jsdelivr.net">
    <style>
        body { padding: 20px; max-width: 600px; margin: 0 auto; text-align: center; }
        video { width: 100%; max-width: 500px; background: #000; border-radius: 8px; margin-top: 15px; border: 2px solid #333; }
        .hidden { display: none !important; }
        #canvas-container { margin: 20px auto; background: white; padding: 15px; display: inline-block; border-radius: 8px; }
        canvas { display: block; }
    </style>
</head>
<body>

    <main class="container">
        <header>
            <h2>👶 Serverloses P2P Babyfon</h2>
            <p id="status">Wähle die Rolle für dieses Gerät.</p>
        </header>

        <!-- Rolle auswählen -->
        <section id="setup-zone">
            <article>
                <div class="grid">
                    <button id="btn-baby" class="contrast">👶 Baby-Gerät (Sender)</button>
                    <button id="btn-parents">🧓 Eltern-Gerät (Empfänger)</button>
                </div>
            </article>
        </section>

        <!-- Baby-Gerät -->
        <section id="baby-zone" class="hidden">
            <article>
                <h3>🔴 Kamera läuft</h3>
                <p>Scanne diesen QR-Code mit dem Eltern-Handy, um den Stream direkt zu starten:</p>
                
                <div id="canvas-container">
                    <canvas id="qrcode"></canvas>
                </div>
                
                <p><small>Alternativ: Sende die URL der Browserzeile an das Elterngerät.</small></p>
                <video id="local-video" autoplay playsinline muted></video>
            </article>
        </section>

        <!-- Eltern-Gerät -->
        <section id="parents-zone" class="hidden">
            <article>
                <h3>🧓 Empfänger-Modus</h3>
                <p id="parent-instruction">Verbindung wird aufgebaut...</p>
                <video id="remote-video" autoplay playsinline></video>
            </article>
        </section>
    </main>

    <!-- QR Code Bibliothek einbinden -->
    <script src="https://jsdelivr.net"></script>

    <script>
        let peerConnection;
        let localStream;

        // Keine externen Server – rein lokales P2P-Verbindungssetup
        const configuration = { iceServers: [] };

        const statusText = document.getElementById('status');
        const setupZone = document.getElementById('setup-zone');
        const babyZone = document.getElementById('baby-zone');
        const parentsZone = document.getElementById('parents-zone');

        // Automatischer Start des Eltern-Modus, falls ein P2P-Schlüssel in der URL klebt
        const urlParams = new URLSearchParams(window.location.search);
        const offerParam = urlParams.get('offer');

        if (offerParam) {
            startParentsMode(offerParam);
        }

        // --- 1. BABY-GERÄT (Sender) ---
        document.getElementById('btn-baby').addEventListener('click', async () => {
            setupZone.classList.add('hidden');
            babyZone.classList.remove('hidden');
            statusText.innerText = "Starte Video-Vorschau...";

            try {
                localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                document.getElementById('local-video').srcObject = localStream;

                peerConnection = new RTCPeerConnection(configuration);
                localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));

                // Handshake (Offer) erstellen
                const offer = await peerConnection.createOffer();
                await peerConnection.setLocalDescription(offer);

                // Warten, bis der Browser alle lokalen P2P-Pfade gesammelt hat
                peerConnection.onicecandidate = (event) => {
                    if (event.candidate === null) {
                        // Verschlüssele den P2P-Schlüssel kompakt in die URL
                        const base64Offer = btoa(JSON.stringify(peerConnection.localDescription));
                        const targetUrl = `${window.location.origin}${window.location.pathname}?offer=${base64Offer}`;

                        // QR-Code generieren, damit das Eltern-Handy ihn sofort abscannen kann
                        QRCode.toCanvas(document.getElementById('qrcode'), targetUrl, { width: 250 }, (error) => {
                            if (error) console.error(error);
                            statusText.innerHTML = "<strong>QR-Code generiert! Bitte abscannen.</strong>";
                        });

                        // Falls der Browser den Link per WhatsApp teilen will, aktualisieren wir das Adressfeld
                        window.history.pushState({}, '', targetUrl);
                    }
                };

                // Wenn das Eltern-Handy den QR-Code scannt und seine Antwort schickt, schließt sich der Kreis
                window.addEventListener('hashchange', async () => {
                    const hash = window.location.hash.substring(1);
                    if (hash) {
                        const answerDescription = JSON.parse(atob(hash));
                        await peerConnection.setRemoteDescription(new RTCSessionDescription(answerDescription));
                        statusText.innerHTML = "<strong>🔴 Verbindung erfolgreich! Stream läuft live.</strong>";
                        document.getElementById('canvas-container').style.display = 'none';
                    }
                });

            } catch (err) {
                statusText.innerHTML = `<span style="color:red">Kamerafehler: ${err.message}</span>`;
            }
        });

        // --- 2. ELTERN-GERÄT (Empfänger) ---
        document.getElementById('btn-parents').addEventListener('click', () => {
            setupZone.classList.add('hidden');
            parentsZone.classList.remove('hidden');
            document.getElementById('parent-instruction').innerText = "Bitte scanne den QR-Code auf dem Baby-Gerät, um die Kamera direkt zu öffnen.";
            statusText.innerText = "Warte auf QR-Scan...";
        });

        async function startParentsMode(base64Offer) {
            setupZone.classList.add('hidden');
            parentsZone.classList.remove('hidden');
            statusText.innerText = "Verarbeite P2P-Verbindung...";

            try {
                const offerDescription = JSON.parse(atob(base64Offer));
                peerConnection = new RTCPeerConnection(configuration);

                // Wenn Videodaten eintreffen -> Sofort anzeigen
                peerConnection.ontrack = (event) => {
                    if (event.streams && event.streams[0]) {
                        document.getElementById('remote-video').srcObject = event.streams[0];
                        statusText.innerHTML = "<strong>🔴 Live-Verbindung aktiv!</strong>";
                        document.getElementById('parent-instruction').innerText = "Übertragung läuft.";
                    }
                };

                await peerConnection.setRemoteDescription(new RTCSessionDescription(offerDescription));
                const answer = await peerConnection.createAnswer();
                await peerConnection.setLocalDescription(answer);

                // Antwort (Answer) generieren
                peerConnection.onicecandidate = (event) => {
                    if (event.candidate === null) {
                        const base64Answer = btoa(JSON.stringify(peerConnection.localDescription));
                        
                        // Das Eltern-Gerät öffnet ein Fenster, das dem Baby-Handy den Rückkanal mitteilt. 
                        // Da wir auf GitHub Pages keinen Server haben, ist das der sicherste, absolut unzerstörbare Weg.
                        const returnUrl = `${window.location.href.split('?')[0]}#${base64Answer}`;
                        
                        statusText.innerHTML = "<strong>Fast geschafft!</strong>";
                        document.getElementById('parent-instruction').innerHTML = `
                            <p>Um den Handshake abzuschließen, tippe unten auf den Button. Sende diesen Link einmalig zurück an das Baby-Gerät (z.B. kurz öffnen/neu laden auf dem Baby-Handy).</p>
                            <a href="${returnUrl}" target="_blank" class="button">Verbindung freischalten</a>
                        `;
                    }
                };

            } catch (err) {
                statusText.innerHTML = `<span style="color:red">Fehler beim Verbinden: ${err.message}</span>`;
            }
        }
    </script>
</body>
</html>
