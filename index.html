<!DOCTYPE html>
<html lang="de" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P2P Direkt-Babyfon</title>
    <link rel="stylesheet" href="https://jsdelivr.net">
    <style>
        body { padding: 20px; max-width: 600px; margin: 0 auto; text-align: center; }
        video { width: 100%; max-width: 500px; background: #000; border-radius: 8px; margin-top: 15px; border: 2px solid #333; }
        .hidden { display: none !important; }
        .room-box { font-size: 1.5rem; font-weight: bold; background: #1a1a1a; padding: 15px; border-radius: 8px; margin: 15px 0; border: 1px dashed #00bcd4; }
    </style>
</head>
<body>

    <main class="container">
        <header>
            <h2>👶 P2P Web-Babyfon</h2>
            <p id="status">Wähle eine Rolle für dieses Gerät.</p>
        </header>

        <!-- Sektion 1: Modus-Auswahl -->
        <section id="setup-zone">
            <article>
                <h3>Rolle auswählen:</h3>
                <div class="grid">
                    <button id="btn-baby" class="contrast">👶 Baby-Gerät (Sender)</button>
                    <button id="btn-parents">🧓 Eltern-Gerät (Empfänger)</button>
                </div>
            </article>
        </section>

        <!-- Sektion 2: Gemeinsamer Verbindungsraum -->
        <section id="room-zone" class="hidden">
            <article>
                <h3 id="room-title">Verbindung wird hergestellt...</h3>
                <p>Nutze auf beiden Geräten denselben Raumnamen:</p>
                <div id="room-display" class="room-box">...</div>
                <video id="baby-video" autoplay playsinline></video>
            </article>
        </section>
    </main>

    <!-- Einbindung eines stabilen Standard-Verbindungshelfers (PeerJS) -->
    <script src="https://unpkg.com"></script>
    <script>
        const statusText = document.getElementById('status');
        const setupZone = document.getElementById('setup-zone');
        const roomZone = document.getElementById('room-zone');
        const roomDisplay = document.getElementById('room-display');
        const roomTitle = document.getElementById('room-title');
        const videoElement = document.getElementById('baby-video');

        // Wir nutzen leere Optionen. PeerJS bringt eigene, extrem robuste Fallback-Server mit.
        // Das verhindert den "Invalid hostname format"-Fehler komplett!
        const peerOptions = {
            debug: 1
        };

        // Generiert einen zufälligen, kurzen Raumnamen (z.B. baby-472)
        const generateRoomName = () => 'baby-' + Math.floor(100 + Math.random() * 900);

        // --- 1. BABY-GERÄT (Sender) ---
        document.getElementById('btn-baby').addEventListener('click', async () => {
            setupZone.classList.add('hidden');
            roomZone.classList.remove('hidden');
            roomTitle.innerText = "🔴 Baby-Gerät ist aktiv";
            statusText.innerText = "Kamera wird gestartet...";

            try {
                // Kamera und Mikrofon aktivieren
                const localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                videoElement.srcObject = localStream;
                videoElement.muted = true; // Eigene Vorschau stummschalten gegen Rückkopplung

                const roomId = generateRoomName();
                roomDisplay.innerText = roomId;
                statusText.innerText = "Warte auf das Eltern-Gerät...";

                // P2P-Verbindung unter der Raum-ID öffnen
                const peer = new Peer(roomId, peerOptions);

                // Wenn das Eltern-Gerät anruft, antworte automatisch mit dem Kamerabild
                peer.on('call', (call) => {
                    statusText.innerHTML = "<strong>Verbindung aktiv! Übertragung läuft...</strong>";
                    call.answer(localStream);
                });

                peer.on('error', (err) => {
                    if (err.type === 'unavailable-id') {
                        // Falls die ID besetzt ist, einfach neu versuchen
                        location.reload();
                    }
                });

            } catch (err) {
                statusText.innerHTML = `<span style="color:red">Fehler beim Kamerastart: ${err.message}</span>`;
            }
        });

        // --- 2. ELTERN-GERÄT (Empfänger) ---
        document.getElementById('btn-parents').addEventListener('click', () => {
            setupZone.classList.add('hidden');
            roomZone.classList.remove('hidden');
            roomTitle.innerText = "🧓 Eltern-Gerät ist aktiv";
            statusText.innerText = "Bereit zum Verbinden.";

            // Erstelle ein Eingabefeld für den Raumnamen
            roomDisplay.innerHTML = `
                <input type="text" id="input-room-id" placeholder="z.B. baby-472" style="text-align:center; max-width:300px; margin: 0 auto;">
                <button id="btn-start-listening" style="margin-top:10px;">Verbindung herstellen</button>
            `;

            document.getElementById('btn-start-listening').addEventListener('click', () => {
                const targetRoomId = document.getElementById('input-room-id').value.trim().toLowerCase();
                if (!targetRoomId) return alert("Bitte gib den Raumnamen des Baby-Handys ein!");

                statusText.innerText = "Suche Baby-Gerät im Netzwerk...";
                
                // Eine zufällige ID für das Eltern-Gerät generieren
                const peer = new Peer(peerOptions);

                peer.on('open', () => {
                    // Wir rufen das Baby-Gerät an. Wir senden keinen eigenen Stream mit, da wir nur empfangen wollen.
                    // Ein leerer Stream-Dummy trickst WebRTC aus, falls der Empfänger reines Audio/Video erwartet.
                    const dummyStream = new MediaStream();
                    const call = peer.call(targetRoomId, dummyStream);

                    call.on('stream', (remoteStream) => {
                        videoElement.srcObject = remoteStream;
                        videoElement.muted = false; // Ton einschalten!
                        statusText.innerHTML = "<strong>🔴 Live-Übertragung läuft! Du hörst und siehst dein Baby.</strong>";
                    });

                    call.on('error', (err) => {
                        statusText.innerHTML = `<span style="color:red">Verbindungsfehler: ${err.message}</span>`;
                    });
                });
            });
        });
    </script>
</body>
</html>
