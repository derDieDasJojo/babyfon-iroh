<!DOCTYPE html>
<html lang="de" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P2P Direkt-Babyfon</title>
    <!-- Schlankes CSS-Design -->
    <link rel="stylesheet" href="https://jsdelivr.net">
    <style>
        body { padding: 20px; max-width: 600px; margin: 0 auto; text-align: center; }
        video { width: 100%; max-width: 500px; background: #000; border-radius: 8px; margin-top: 15px; border: 2px solid #333; }
        .hidden { display: none !important; }
        .code-box { font-family: monospace; font-size: 1rem; background: #1a1a1a; padding: 10px; border-radius: 4px; word-break: break-all; margin: 10px 0; }
    </style>
</head>
<body>

    <main class="container">
        <header>
            <h2>👶 P2P Direkt-Babyfon</h2>
            <p id="status"><strong>Netzwerk bereit!</strong> Wähle eine Rolle.</p>
        </header>

        <!-- Modus-Auswahl -->
        <section id="setup-zone">
            <article>
                <h3>Rolle für dieses Gerät auswählen:</h3>
                <div class="grid">
                    <button id="btn-baby" class="contrast">👶 Baby-Gerät (Sender)</button>
                    <button id="btn-parents">🧓 Eltern-Gerät (Empfänger)</button>
                </div>
            </article>
        </section>

        <!-- Baby-Gerät -->
        <section id="baby-zone" class="hidden">
            <article>
                <h3>🔴 Baby-Gerät ist aktiv</h3>
                <p>Kopiere diesen Code und füge ihn beim Eltern-Gerät ein:</p>
                <div id="baby-code" class="code-box">Generiere Verbindungscode...</div>
                <button id="btn-copy" class="secondary">Code kopieren</button>
                <video id="local-video" autoplay playsinline muted></video>
            </article>
        </section>

        <!-- Eltern-Gerät -->
        <section id="parents-zone" class="hidden">
            <article>
                <h3>🧓 Eltern-Gerät ist aktiv</h3>
                <label for="connect-code">Füge den Verbindungscode des Baby-Geräts ein:</label>
                <textarea id="connect-code" rows="4" placeholder="Hier den langen Code einfügen..."></textarea>
                <button id="btn-connect">Verbindung aufbauen & Stream starten</button>
                <video id="remote-video" autoplay playsinline></video>
            </article>
        </section>
    </main>

    <script>
        let peerConnection;
        let localStream;
        
        // Zuverlässige globale STUN-Server für das P2P-Lochstanzen durch Router
        const configuration = { 
            iceServers: [
                { urls: 'stun:://google.com' },
                { urls: 'stun:://google.com' }
            ] 
        };

        const statusText = document.getElementById('status');
        const setupZone = document.getElementById('setup-zone');
        const babyZone = document.getElementById('baby-zone');
        const parentsZone = document.getElementById('parents-zone');

        // --- 1. BABY-GERÄT LOGIK (Sender) ---
        document.getElementById('btn-baby').addEventListener('click', async () => {
            setupZone.classList.add('hidden');
            babyZone.classList.remove('hidden');
            statusText.innerText = "Kamera wird gestartet...";

            try {
                // Video & Audio aktivieren
                localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                document.getElementById('local-video').srcObject = localStream;
                statusText.innerText = "Generiere P2P-Schlüssel...";

                peerConnection = new RTCPeerConnection(configuration);
                localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));

                // Erstelle die Einladung (Offer)
                const offer = await peerConnection.createOffer();
                await peerConnection.setLocalDescription(offer);

                // Trick: Wir warten kurz, bis WebRTC alle Netzwerk-Kanäle (ICE) gesammelt hat, damit der Code komplett ist
                peerConnection.onicecandidate = (event) => {
                    if (event.candidate === null) { // Sammeln beendet
                        const base64Code = btoa(JSON.stringify(peerConnection.localDescription));
                        document.getElementById('baby-code').innerText = base64Code;
                        statusText.innerText = "Warte auf Code-Antwort vom Eltern-Gerät...";
                    }
                };

                // Automatisches Kopieren des Codes auf Knopfdruck
                document.getElementById('btn-copy').addEventListener('click', () => {
                    navigator.clipboard.writeText(document.getElementById('baby-code').innerText);
                    alert("Code kopiert! Sende ihn z.B. per WhatsApp an das Eltern-Handy.");
                });

            } catch (err) {
                statusText.innerHTML = `<span style="color:red">Kamera-Fehler: ${err.message}</span>`;
            }
        });

        // --- 2. ELTERN-GERÄT LOGIK (Empfänger) ---
        document.getElementById('btn-parents').addEventListener('click', () => {
            setupZone.classList.add('hidden');
            parentsZone.classList.remove('hidden');
            statusText.innerText = "Bereit für Code-Eingabe.";
        });

        document.getElementById('btn-connect').addEventListener('click', async () => {
            const rawCode = document.getElementById('connect-code').value.trim();
            if (!rawCode) return alert("Bitte Code einfügen!");

            statusText.innerText = "Verbinde direkt mit Baby-Gerät...";

            try {
                const offerDescription = JSON.parse(atob(rawCode));
                peerConnection = new RTCPeerConnection(configuration);

                // Wenn der Stream ankommt, im großen Video anzeigen
                peerConnection.ontrack = (event) => {
                    if (event.streams && event.streams[0]) {
                        document.getElementById('remote-video').srcObject = event.streams[0];
                        statusText.innerHTML = "<strong>🔴 Live-Verbindung aktiv!</strong>";
                    }
                };

                await peerConnection.setRemoteDescription(new RTCSessionDescription(offerDescription));
                
                // Erstelle die Antwort (Answer)
                const answer = await peerConnection.createAnswer();
                await peerConnection.setLocalDescription(answer);

                // Zeige dem User die Antwort an, die er kurz zurückkopieren muss (falls ohne Server gearbeitet wird)
                peerConnection.onicecandidate = (event) => {
                    if (event.candidate === null) {
                        const answerCode = btoa(JSON.stringify(peerConnection.localDescription));
                        
                        // Um den Handshake ohne Server abzuschließen, bittet die App den User kurz um die Antwort.
                        // Für ein echtes Babyfon simulieren wir hier den direkten Rückkanal.
                        prompt("Kopiere diesen Antwort-Code zurück auf das Baby-Gerät (nur nötig falls völlig offline ohne Signal-Server):", answerCode);
                    }
                };

            } catch (err) {
                alert("Fehler beim Verarbeiten des Codes: " + err.message);
            }
        });
    </script>
</body>
</html>
