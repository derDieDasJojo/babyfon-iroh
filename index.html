<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P2P Iroh Babyfon</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #222; color: #fff; padding: 20px; }
        video { width: 100%; max-width: 500px; background: #000; border-radius: 8px; margin-top: 10px; }
        .card { background: #333; padding: 20px; border-radius: 8px; margin: 10px auto; max-width: 500px; }
        button { background: #00bcd4; border: none; padding: 10px 20px; color: white; font-size: 16px; border-radius: 4px; cursor: pointer; margin: 5px; }
        button:hover { background: #0097a7; }
        input { padding: 10px; width: 80%; max-width: 300px; border-radius: 4px; border: none; margin: 5px; color: #000; }
        .hidden { display: none; }
        #error-log { color: #ff5252; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

    <h1>👶 P2P Iroh Babyfon</h1>
    <p id="status">Lade Iroh Node (WebAssembly)...</p>
    <p id="error-log"></p>

    <!-- Modus-Auswahl -->
    <div id="setup-zone" class="card hidden">
        <h3>Rolle auswählen:</h3>
        <button id="btn-baby">👶 Baby-Gerät (Sender)</button>
        <button id="btn-parents">🧓 Eltern-Gerät (Empfänger)</button>
    </div>

    <!-- Bereich für das Baby-Gerät -->
    <div id="baby-zone" class="card hidden">
        <h3>Baby-Gerät aktiv</h3>
        <p>Gib diese Node-ID an das Eltern-Gerät weiter:</p>
        <input type="text" id="baby-node-id" readonly onclick="this.select()">
        <video id="local-video" autoplay playsinline muted></video>
    </div>

    <!-- Bereich für das Eltern-Gerät -->
    <div id="parents-zone" class="card hidden">
        <h3>Eltern-Gerät aktiv</h3>
        <p>Gib die Node-ID des Baby-Geräts ein:</p>
        <input type="text" id="connect-id" placeholder="Baby Node ID hier einfügen...">
        <button id="btn-connect">Verbinden & Stream starten</button>
        <video id="remote-video" autoplay playsinline></video>
    </div>

    <!-- Einbindung von Iroh Wasm & WebRTC-Logik -->
    <script type="module">
        // Nutzen des korrekten WebAssembly-Browser-Pakets von Iroh via unpkg/esm
        import init, { IrohNode } from 'https://unpkg.com';

        let node;
        let peerConnection;
        let localStream;
        
        // Google STUN-Server hinzugefügt, damit WebRTC die lokalen Medienkanäle korrekt initialisiert
        const configuration = { 
            iceServers: [{ urls: 'stun:://google.com' }] 
        };

        const statusText = document.getElementById('status');
        const errorLog = document.getElementById('error-log');
        const setupZone = document.getElementById('setup-zone');
        const babyZone = document.getElementById('baby-zone');
        const parentsZone = document.getElementById('parents-zone');

        // 1. Iroh Node über WebAssembly initialisieren
        async function initIroh() {
            try {
                // Wasm-Dateien im Browser instanziieren
                await init(); 
                
                statusText.innerText = "Erstelle flüchtige Browser-Node...";
                
                // Erstellt eine reine In-Memory Browser-Node
                node = await IrohNode.memory();
                const nodeId = await node.nodeId();
                
                statusText.innerText = "Iroh über WebAssembly erfolgreich geladen!";
                setupZone.classList.remove('hidden');
                document.getElementById('baby-node-id').value = nodeId;
            } catch (err) {
                statusText.innerText = "Fehler beim Laden!";
                errorLog.innerText = `Details: ${err.message || err}\nStelle sicher, dass du die Datei über einen lokalen Server (http://localhost) ausführst!`;
                console.error("Iroh-Fehler:", err);
            }
        }

        // 2. Baby-Gerät (Sender)
        document.getElementById('btn-baby').addEventListener('click', async () => {
            try {
                setupZone.classList.add('hidden');
                babyZone.classList.remove('hidden');

                statusText.innerText = "Frage Kamera-Berechtigung ab...";
                localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                document.getElementById('local-video').srcObject = localStream;

                statusText.innerText = "Warte auf Verbindung vom Eltern-Gerät...";
                
                // Protokoll-Handler für das Babyfon registrieren
                await node.createConnectionHandler('babyfon-signaling', async (connection) => {
                    statusText.innerText = "Eltern-Gerät dockt an. Tausche WebRTC-Daten aus...";
                    
                    // Datenkanal öffnen
                    const channel = await connection.openBi();
                    
                    peerConnection = new RTCPeerConnection(configuration);
                    localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));

                    // Signal-Empfang
                    channel.readable.pipeTo(new WritableStream({
                        async write(chunk) {
                            const signal = JSON.parse(new TextDecoder().decode(chunk));
                            if (signal.sdp) {
                                await peerConnection.setRemoteDescription(new RTCSessionDescription(signal.sdp));
                                const answer = await peerConnection.createAnswer();
                                await peerConnection.setLocalDescription(answer);
                                
                                const writer = channel.writable.getWriter();
                                await writer.write(new TextEncoder().encode(JSON.stringify({ sdp: peerConnection.localDescription })));
                                writer.releaseLock();
                                statusText.innerText = "Verbindung steht! Stream läuft. 🔴";
                            }
                        }
                    }));
                });
            } catch (err) {
                errorLog.innerText = "Kamerafehler oder Iroh-Verbindungsfehler: " + err.message;
            }
        });

        // 3. Eltern-Gerät (Empfänger)
        document.getElementById('btn-parents').addEventListener('click', () => {
            setupZone.classList.add('hidden');
            parentsZone.classList.remove('hidden');
            statusText.innerText = "Bereit zum Koppeln.";
        });

        document.getElementById('btn-connect').addEventListener('click', async () => {
            const targetNodeId = document.getElementById('connect-id').value.trim();
            if (!targetNodeId) return alert("Bitte Node-ID eintragen.");

            statusText.innerText = "Verbinde P2P mit Baby-Gerät...";
            errorLog.innerText = "";

            try {
                const connection = await node.connect(targetNodeId, 'babyfon-signaling');
                statusText.innerText = "Iroh-Tunnel steht. Initialisiere WebRTC...";

                // WebRTC Empfänger-Instanz
                peerConnection = new RTCPeerConnection(configuration);
                
                peerConnection.ontrack = (event) => {
                    if (event.streams && event.streams[0]) {
                        document.getElementById('remote-video').srcObject = event.streams[0];
                        statusText.innerText = "Live-Verbindung aktiv! Eltern-Modus.";
                    }
                };

                // Datenkanal vom Baby-Gerät anfordern
                await node.createConnectionHandler('babyfon-signaling', async (conn) => {
                    // Falls das Baby-Gerät den Kanal öffnet
                });

                // Simuliere den Handshake über eine ausgehende Verbindung
                const channel = await connection.openBi();
                const offer = await peerConnection.createOffer();
                await peerConnection.setLocalDescription(offer);

                const writer = channel.writable.getWriter();
                await writer.write(new TextEncoder().encode(JSON.stringify({ sdp: peerConnection.localDescription })));
                writer.releaseLock();

                channel.readable.pipeTo(new WritableStream({
                    async write(chunk) {
                        const response = JSON.parse(new TextDecoder().decode(chunk));
                        if (response.sdp) {
                            await peerConnection.setRemoteDescription(new RTCSessionDescription(response.sdp));
                        }
                    }
                }));

            } catch (err) {
                errorLog.innerText = "Kopplung fehlgeschlagen: " + err.message;
                console.error(err);
            }
        });

        // Start
        initIroh();
    </script>
</body>
</html>
